name: integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  media-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Run media integration tests
        run: go test -tags=integration ./internal/media
